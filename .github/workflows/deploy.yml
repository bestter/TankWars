# .github/workflows/deploy.yml
name: Deploy TankWars to GitHub Pages

on:
  push:
    branches: [ main ] # Déploie automatiquement quand tu push sur main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build
        # Assure-toi que ta base URL est configurée (ex: /TankWars/) dans ton vite.config.ts

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Remplace par './build' si tu n'utilises pas Vite

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4